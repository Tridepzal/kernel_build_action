name: Build Kernel Poco X3 Pro
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build Kernel
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Kernel
        uses: ./
        with:
          kernel-url: https://github.com/tejas101k/kernel_xiaomi_vayu
          kernel-dir: vayu-kernel
          kernel-branch: sixteen
          config: vayu_user_defconfig
          arch: arm64
          android-version: 12
          ksu: true
          ksu-version: main
          disable-lto: true
          anykernel3: true
          extra-make-args: O=out KBUILD_ABS_SRCTREE=1
